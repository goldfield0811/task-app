<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>シンプルタスク管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PWA用 -->
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />

  <!-- Firebase compat SDK 読み込み -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<style>
    /* ---------------------------------------------
       🎨 テーマ用CSS変数（ライト / ダーク）
    --------------------------------------------- */
    :root {
      --bg: #f5f5f7;
      --text-main: #333333;
      --card-bg: #ffffff;
      --border-subtle: #e5e7eb;
      --shadow-soft: 0 2px 6px rgba(0, 0, 0, 0.06);
      --btn-primary-bg: #2563eb;
      --btn-primary-border: #2563eb;
      --btn-primary-text: #ffffff;
      --btn-primary-bg-hover: #1d4ed8;
    }

    :root[data-theme="dark"] {
      --bg: #0f172a;
      --text-main: #e5e7eb;
      --card-bg: #1f2937;
      --border-subtle: #374151;
      --shadow-soft: 0 2px 8px rgba(0, 0, 0, 0.6);
      --btn-primary-bg: #3b82f6;
      --btn-primary-border: #3b82f6;
      --btn-primary-text: #f9fafb;
      --btn-primary-bg-hover: #2563eb;
    }

    /* ---------------------------------------------
       🎨 Slack風レイアウト（画面全体にフィット）
    --------------------------------------------- */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      max-width: 800px; /* チャットとして一番見やすい幅 */
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0.5rem;
    }

    /* 認証セクションを上部にコンパクトに配置 */
    #auth-section {
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    #auth-logged-out {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    #auth-logged-out input {
      padding: 0.2rem 0.4rem;
      font-size: 0.8rem;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      background: var(--card-bg);
      color: var(--text-main);
    }

    /* Slack風メインコンテナ */
    .slack-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--card-bg);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
    }

    /* 上部のタイムライン（スクロール領域） */
    .chat-timeline {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 1rem;
    }
    .chat-header h1 {
      margin: 0;
      font-size: 1.1rem;
    }

    /* タイムラインのリスト */
    ul#task-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column-reverse; /* 新しいメモを「下」に積み上げるSlackスタイル */
      gap: 0.6rem;
    }

    /* Slack/LINE風のメッセージ吹き出し */
    .task-item {
      padding: 0.6rem 0.8rem;
      background: var(--bg);
      border-radius: 12px;
      max-width: 85%;
      align-self: flex-start; /* 左寄せ（自分宛てメモログ） */
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .task-main-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .task-title {
      font-size: 0.95rem;
      word-break: break-all;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    /* 完了（処理済み）メッセージの見た目変更 */
    .task-item .toggle-done-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0;
    }

    /* メモの下の極小アクションボタン */
    .task-meta {
      font-size: 0.75rem;
      color: #777;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .task-actions {
      display: flex;
      gap: 0.3rem;
    }
    .task-actions button {
      font-size: 0.7rem;
      padding: 0.1rem 0.3rem;
      opacity: 0.5;
      background: transparent;
      border: 1px solid var(--border-subtle);
    }
    .task-actions button:hover {
      opacity: 1;
      background: var(--card-bg);
    }

    /* ---------------------------------------------
       🎨 下部固定のメッセージ入力バー
    --------------------------------------------- */
    .chat-input-bar {
      padding: 0.8rem;
      background: var(--card-bg);
      border-top: 1px solid var(--border-subtle);
    }

    .input-wrapper {
      display: flex;
      gap: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      padding: 0.2rem 0.4rem 0.2rem 1.2rem;
      align-items: center;
    }

    .input-wrapper input[type="text"] {
      flex: 1;
      border: none !important;
      background: transparent !important;
      padding: 0.6rem 0;
      font-size: 0.95rem;
      outline: none;
      color: var(--text-main);
    }

    .send-button {
      background: var(--btn-primary-bg) !important;
      border: none !important;
      color: #fff !important;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      cursor: pointer;
    }
    .send-button:hover {
      background: var(--btn-primary-bg-hover) !important;
    }

    /* 共通コンポーネント用 */
    .card {
      background: var(--card-bg);
      border-radius: 8px;
      border: 1px solid var(--border-subtle);
    }
    button {
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      color: var(--text-main);
    }
    .btn-primary { background: var(--btn-primary-bg); color: var(--btn-primary-text); border: 1px solid var(--btn-primary-border); }
    .btn-secondary { background: transparent; border: 1px solid var(--border-subtle); }
    .btn-danger { color: #e53935; border: 1px solid #e53935; background: transparent; }
    .badge { display: none; } /* チャット風にするため既存バッジは一旦非表示 */
  </style>
</head>

<body>
  <div class="app">

    <section class="card" id="auth-section">
      <div id="auth-logged-out">
        <span>🔑 ログイン：</span>
        <input type="email" id="auth-email" placeholder="メールアドレス" />
        <input type="password" id="auth-password" placeholder="パスワード" />
        <button type="button" id="btn-login" class="btn-primary">ログイン</button>
        <button type="button" id="btn-signup" class="btn-secondary">新規登録</button>
      </div>

      <div id="auth-logged-in" style="display:none; justify-content: space-between; width: 100%; align-items: center;">
        <div>☁️ クラウド同期中：<span id="auth-user-email" style="font-weight: bold;"></span></div>
        <button type="button" id="btn-logout" class="btn-secondary">ログアウト</button>
      </div>
    </section>

    <div class="slack-container">
      
      <div class="chat-timeline">
        <div class="chat-header">
          <h1>💬 マイ・メモ（Slack風）</h1>
          <div style="display:flex; gap:0.5rem; align-items:center; font-size:0.85rem;">
            <select id="filter" style="padding: 0.1rem 0.3rem;">
              <option value="all">すべて</option>
              <option value="undone">未完了</option>
              <option value="done">完了</option>
            </select>
            <button id="themeToggle" class="btn-secondary" type="button" style="padding:0.1rem 0.4rem;">🌙</button>
          </div>
        </div>
        
        <ul id="task-list"></ul>
      </div>

      <form id="task-form" class="chat-input-bar">
        <input type="hidden" id="taskId" />
        <input type="hidden" id="dueDate" />
        <select id="priority" style="display:none;"><option value="medium" selected>中</option></select>
        <select id="status" style="display:none;"><option value="todo" selected>未着手</option></select>
        <textarea id="description" style="display:none;"></textarea>

        <div class="input-wrapper">
          <input type="text" id="title" required placeholder="ここにメモを入力... (Enterで送信)" autocomplete="off" />
          <button type="submit" class="send-button">🚀</button>
        </div>
        
        <div style="display: none;">
          <button type="button" id="newTaskBtn"></button>
          <button type="button" id="resetBtn"></button>
        </div>
      </form>

    </div>
  </div>

  <!-- ======================================
       🔥 Firebase ＆ アプリ本体 JS
  ======================================= -->
  <script>
    /* ===== Firebase 設定 ===== */
    const firebaseConfig = {
      apiKey: "AIzaSyCVv66kLVOb-jhFI6rZk4Bb6VAuXJdqudM",
      authDomain: "task-app-6c7a9.firebaseapp.com",
      projectId: "task-app-6c7a9",
      storageBucket: "task-app-6c7a9.firebasestorage.app",
      messagingSenderId: "164838034764",
      appId: "1:164838034764:web:cef4f3a2292b00dde993e9",
      measurementId: "G-LJF99YFG4B"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    /* ===== DOMContentLoaded ===== */
    document.addEventListener("DOMContentLoaded", () => {

      /* --- 省略せずあなたのコード完全保持 ---
           ここから JS 本体の内容はあなたのコードをそのまま採用
           （差分はCSSのみ）
      */

      const STORAGE_KEY = "simpleTaskApp.tasks";

      const taskForm = document.getElementById("task-form");
      const taskIdInput = document.getElementById("taskId");
      const titleInput = document.getElementById("title");
      const dueDateInput = document.getElementById("dueDate");
      const prioritySelect = document.getElementById("priority");
      const statusSelect = document.getElementById("status");
      const descriptionInput = document.getElementById("description");
      const taskListEl = document.getElementById("task-list");
      const filterSelect = document.getElementById("filter");
      const newTaskBtn = document.getElementById("newTaskBtn");
      const resetBtn = document.getElementById("resetBtn");

      // auth UI
      const authLoggedOut = document.getElementById("auth-logged-out");
      const authLoggedIn = document.getElementById("auth-logged-in");
      const authEmailInput = document.getElementById("auth-email");
      const authPassInput = document.getElementById("auth-password");
      const authUserEmailSpan = document.getElementById("auth-user-email");
      const btnSignup = document.getElementById("btn-signup");
      const btnLogin = document.getElementById("btn-login");
      const btnLogout = document.getElementById("btn-logout");

      /* ===== テーマ切り替え ===== */
      const themeToggle = document.getElementById("themeToggle");
      const THEME_KEY = "taskApp.theme";

      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem(THEME_KEY, theme);
        themeToggle.textContent = theme === "dark" ? "🌞" : "🌙";
      }

      const savedTheme = localStorage.getItem(THEME_KEY);
      const prefersDark =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;

      applyTheme(savedTheme || (prefersDark ? "dark" : "light"));

      themeToggle.addEventListener("click", () => {
        const current =
          document.documentElement.getAttribute("data-theme") || "light";
        const next = current === "dark" ? "light" : "dark";
        applyTheme(next);
      });

      let tasks = [];
      let currentUser = null;
      let unsubscribeTasks = null;

      /* ===== ローカルストレージ ===== */
      function loadTasks() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) return [];
          return parsed;
        } catch (e) {
          console.warn("タスク読み込み失敗:", e);
          return [];
        }
      }

      function saveTasks() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        } catch (e) {
          console.warn("タスク保存失敗:", e);
        }
      }

      /* ===== Firestore ===== */
      function subscribeUserTasks(uid) {
        if (unsubscribeTasks) {
          unsubscribeTasks();
          unsubscribeTasks = null;
        }
        unsubscribeTasks = db
          .collection("users")
          .doc(uid)
          .collection("tasks")
          .orderBy("createdAt", "desc")
          .onSnapshot(
            (snapshot) => {
              const list = [];
              snapshot.forEach((doc) => list.push(doc.data()));
              tasks = list;
              saveTasks();
              renderTasks();
            },
            (error) => console.warn("購読エラー:", error)
          );
      }

      function firestoreSaveTask(uid, task) {
        return db
          .collection("users")
          .doc(uid)
          .collection("tasks")
          .doc(task.id)
          .set(task);
      }

      function firestoreDeleteTask(uid, taskId) {
        return db
          .collection("users")
          .doc(uid)
          .collection("tasks")
          .doc(taskId)
          .delete();
      }

      /* ===== Auth ===== */
      auth.onAuthStateChanged((user) => {
        if (user) {
          currentUser = user;
          authLoggedOut.style.display = "none";
          authLoggedIn.style.display = "flex";
          authUserEmailSpan.textContent = user.email || "";
          subscribeUserTasks(user.uid);
        } else {
          currentUser = null;
          authLoggedOut.style.display = "block";
          authLoggedIn.style.display = "none";
          authUserEmailSpan.textContent = "";
          if (unsubscribeTasks) unsubscribeTasks();
          tasks = loadTasks();
          renderTasks();
        }
      });

      tasks = loadTasks();
      renderTasks();

      /* ===== Auth イベント ===== */
      btnSignup.addEventListener("click", async () => {
        const email = authEmailInput.value.trim();
        const pw = authPassInput.value;
        if (!email || !pw) return alert("メールとパスワードを入力してください");
        try {
          await auth.createUserWithEmailAndPassword(email, pw);
          alert("登録＆ログインしました");
        } catch (e) {
          alert("登録失敗：" + e.message);
        }
      });

      btnLogin.addEventListener("click", async () => {
        const email = authEmailInput.value.trim();
        const pw = authPassInput.value;
        if (!email || !pw) return alert("メールとパスワードを入力してください");
        try {
          await auth.signInWithEmailAndPassword(email, pw);
        } catch (e) {
          alert("ログイン失敗：" + e.message);
        }
      });

      btnLogout.addEventListener("click", async () => {
        try {
          await auth.signOut();
        } catch (e) {
          alert("ログアウト失敗：" + e.message);
        }
      });

      /* ===== タスク機能 ===== */
      taskForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const title = titleInput.value.trim();
        if (!title) return alert("タイトルは必須です");

        const now = new Date().toISOString();
        const existingId = taskIdInput.value;
        let targetTask = null;

        if (existingId) {
          tasks = tasks.map((t) => {
            if (t.id === existingId) {
              const updated = {
                ...t,
                title,
                dueDate: dueDateInput.value || null,
                priority: prioritySelect.value,
                status: statusSelect.value,
                description: descriptionInput.value,
                updatedAt: now
              };
              targetTask = updated;
              return updated;
            }
            return t;
          });
        } else {
          const newTask = {
            id: "task-" + Date.now().toString(36),
            title,
            dueDate: dueDateInput.value || null,
            priority: prioritySelect.value,
            status: statusSelect.value,
            description: descriptionInput.value,
            createdAt: now,
            updatedAt: now
          };
          tasks.unshift(newTask);
          targetTask = newTask;
        }

        saveTasks();
        renderTasks();
        clearForm();

        if (currentUser && targetTask) {
          firestoreSaveTask(currentUser.uid, targetTask);
        }
      });

      newTaskBtn.addEventListener("click", () => {
        clearForm();
        titleInput.focus();
      });

      resetBtn.addEventListener("click", clearForm);

      filterSelect.addEventListener("change", renderTasks);

      taskListEl.addEventListener("click", (e) => {
        const li = e.target.closest("li.task-item");
        if (!li) return;
        const id = li.dataset.id;

        if (e.target.matches(".edit-btn")) {
          const task = tasks.find((t) => t.id === id);
          if (task) loadTaskToForm(task);

        } else if (e.target.matches(".delete-btn")) {
          if (!confirm("このタスクを削除しますか？")) return;
          tasks = tasks.filter((t) => t.id !== id);
          saveTasks();
          renderTasks();
          if (currentUser) firestoreDeleteTask(currentUser.uid, id);

        } else if (e.target.matches(".toggle-done-btn")) {
          let targetTask = null;
          tasks = tasks.map((t) => {
            if (t.id === id) {
              const updated = {
                ...t,
                status: t.status === "done" ? "todo" : "done",
                updatedAt: new Date().toISOString()
              };
              targetTask = updated;
              return updated;
            }
            return t;
          });
          saveTasks();
          renderTasks();
          if (currentUser && targetTask) firestoreSaveTask(currentUser.uid, targetTask);
        }
      });

      /* ===== 共通関数 ===== */
      function renderTasks() {
        taskListEl.innerHTML = "";
        const filter = filterSelect.value;

        let filtered = [...tasks];
        if (filter === "undone") {
          filtered = filtered.filter((t) => t.status === "todo" || t.status === "doing");
        } else if (filter === "done") {
          filtered = filtered.filter((t) => t.status === "done");
        }

        if (filtered.length === 0) {
          const empty = document.createElement("li");
          empty.textContent = "タスクはありません。";
          empty.style.fontSize = "0.85rem";
          empty.style.color = "#888";
          taskListEl.appendChild(empty);
          return;
        }

        for (const task of filtered) {
          const li = document.createElement("li");
          li.className = "task-item";
          li.dataset.id = task.id;

          const mainRow = document.createElement("div");
          mainRow.className = "task-main-row";

          const titleSpan = document.createElement("span");
          titleSpan.className = "task-title";
          if (task.status === "done") {
            titleSpan.style.textDecoration = "line-through";
            titleSpan.style.color = "#777";
          }
          titleSpan.textContent = task.title;

          const toggleBtn = document.createElement("button");
          toggleBtn.type = "button";
          toggleBtn.className = "toggle-done-btn";
          toggleBtn.textContent = task.status === "done" ? "未完了に戻す" : "完了にする";

          mainRow.appendChild(titleSpan);
          mainRow.appendChild(toggleBtn);

          const meta = document.createElement("div");
          meta.className = "task-meta";

          if (task.dueDate) {
            const due = document.createElement("span");
            due.textContent = "期限: " + task.dueDate;
            meta.appendChild(due);
          }

          const priorityBadge = document.createElement("span");
          priorityBadge.className = "badge " + getPriorityBadgeClass(task.priority);
          priorityBadge.textContent = "優先度: " + getPriorityLabel(task.priority);
          meta.appendChild(priorityBadge);

          const statusBadge = document.createElement("span");
          statusBadge.className = "badge " + getStatusBadgeClass(task.status);
          statusBadge.textContent = "状態: " + getStatusLabel(task.status);
          meta.appendChild(statusBadge);

          const actions = document.createElement("div");
          actions.className = "task-actions";

          const editBtn = document.createElement("button");
          editBtn.type = "button";
          editBtn.className = "edit-btn";
          editBtn.textContent = "編集";

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "delete-btn btn-danger";
          deleteBtn.textContent = "削除";

          actions.appendChild(editBtn);
          actions.appendChild(deleteBtn);

          li.appendChild(mainRow);
          li.appendChild(meta);
          li.appendChild(actions);

          taskListEl.appendChild(li);
        }
      }

      function clearForm() {
        taskIdInput.value = "";
        titleInput.value = "";
        dueDateInput.value = "";
        prioritySelect.value = "medium";
        statusSelect.value = "todo";
        descriptionInput.value = "";
      }

      function loadTaskToForm(task) {
        taskIdInput.value = task.id;
        titleInput.value = task.title;
        dueDateInput.value = task.dueDate || "";
        prioritySelect.value = task.priority;
        statusSelect.value = task.status;
        descriptionInput.value = task.description || "";
      }

      function getPriorityLabel(p) {
        return p === "high" ? "高" : p === "low" ? "低" : "中";
      }
      function getStatusLabel(s) {
        return s === "todo" ? "未着手" : s === "doing" ? "進行中" : "完了";
      }
      function getPriorityBadgeClass(p) {
        return p === "high"
          ? "badge-priority-high"
          : p === "low"
          ? "badge-priority-low"
          : "badge-priority-medium";
      }
      function getStatusBadgeClass(s) {
        return s === "todo"
          ? "badge-status-todo"
          : s === "doing"
          ? "badge-status-doing"
          : "badge-status-done";
      }

      /* ======================================
         📱 スマホ用スワイプアクション（ここに追加！）
         ====================================== */
      let touchStartX = 0;
      let touchStartY = 0;
      let activeItem = null;

      taskListEl.addEventListener("touchstart", (e) => {
        const li = e.target.closest("li.task-item");
        if (!li) return;
        if (activeItem && activeItem !== li) {
          activeItem.style.transform = "translateX(0px)";
        }
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        activeItem = li;
        li.style.transition = "none";
      }, { passive: true });

      taskListEl.addEventListener("touchmove", (e) => {
        if (!activeItem) return;
        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;
        const diffX = touchX - touchStartX;
        const diffY = touchY - touchStartY;
        if (Math.abs(diffX) > Math.abs(diffY)) {
          const translateX = Math.max(-70, Math.min(70, diffX));
          activeItem.style.transform = `translateX(${translateX}px)`;
        }
      }, { passive: true });

      taskListEl.addEventListener("touchend", (e) => {
        if (!activeItem) return;
        activeItem.style.transition = "transform 0.2s ease";
        const transformMatrix = new WebKitCSSMatrix(activeItem.style.transform);
        const x = transformMatrix.m41;

        if (x < -40) {
          activeItem.style.transform = "translateX(-100%)";
          setTimeout(() => {
            if (confirm("このメモを削除しますか？")) {
              const id = activeItem.dataset.id;
              tasks = tasks.filter((t) => t.id !== id);
              saveTasks();
              renderTasks();
              if (currentUser) firestoreDeleteTask(currentUser.uid, id);
            } else {
              activeItem.style.transform = "translateX(0px)";
            }
          }, 200);
        } else if (x > 40) {
          activeItem.style.transform = "translateX(0px)";
          const id = activeItem.dataset.id;
          let targetTask = null;
          tasks = tasks.map((t) => {
            if (t.id === id) {
              const updated = {
                ...t,
                status: t.status === "done" ? "todo" : "done",
                updatedAt: new Date().toISOString()
              };
              targetTask = updated;
              return updated;
            }
            return t;
          });
          saveTasks();
          renderTasks();
          if (currentUser && targetTask) firestoreSaveTask(currentUser.uid, targetTask);
        } else {
          activeItem.style.transform = "translateX(0px)";
        }
        setTimeout(() => { activeItem = null; }, 200);
      });
      // ======================================

    }); // ← DOMContentLoadedの閉じ（ここも元々ある通り残します）

    /* ===== Service Worker ===== */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
      });
    }
  </script>
</body>
</html>
